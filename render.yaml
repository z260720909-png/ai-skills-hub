services:
  - type: web
    name: ai-skills-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: APIFOOTBALL_KEY
        sync: false
      - key: GUMROAD_API_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_SHOP_NAME
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
    plan: free
